<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <title>browsewithscroll</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>

    body { background: #1b1c1c; color: #aaabac; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    h1 { color: #8ab6bb; margin-bottom: 2rem; letter-spacing: 1px; }
    input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #8ab6bb; }
    code { background: #111; padding: 2px 5px; border-radius: 3px; color: #8ab6bb; }
    .card { background: #252626; padding: 2.5rem; border-radius: 12px; border: 1px solid #986c98; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 400px; }
    .btn { display: block; margin: 15px 0; padding: 15px; background: #8ab6bb; color: #1b1c1c; text-decoration: none; font-weight: bold; border-radius: 6px; transition: transform 0.2s, background 0.2s; }
    .btn:hover { background: #986c98; color: white; transform: translateY(-2px); }
    .settings { margin-top: 30px; padding-top: 20px; border-top: 1px dashed #444; text-align: left; }
    .settings h3 { font-size: 0.9rem; color: #986c98; text-transform: uppercase; margin-bottom: 15px; }
    .toggle-container { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; }
    .init-hint { font-size: 0.75rem; color: #555; margin-top: 25px; line-height: 1.4; }

  </style>

</head>

<body>

  <div class="card">
    <h1>browsewithscroll</h1>
    
    <a href="fonts/fonts.html" class="btn">font scroll</a>
    <a href="media/media.html" class="btn">media scroll</a>
    
    <div class="settings">
      <h3>global settings:</h3>
      <label class="toggle-container">
        <input type="checkbox" id="shuffle-toggle">
        <span>shuffle assets (randomize order)</span>
      </label>
    </div>

    <div class="init-hint">to sync new files, run in terminal:<br><br>
      <code>launch.sh</code>
    </div>

  </div>

  <script>
    const toggle = document.getElementById('shuffle-toggle');

    // load saved preference (defaults to true)
    const savedShuffle = localStorage.getItem('shuffleAssets');
    toggle.checked = savedShuffle === null ? true : savedShuffle === 'true';

    // save on change
    toggle.addEventListener('change', () => {
      localStorage.setItem('shuffleAssets', toggle.checked);
    });

  </script>

</body>

</html>
