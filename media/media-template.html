<!DOCTYPE html>
<html>
<head>

  <meta charset="UTF-8">
  <title>media-scroller</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">

  <style>

    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1b1c1c; color: #aaabac; font-family: sans-serif; }
    #focus-viewer { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100%; padding: 40px; box-sizing: border-box; }
    #media-container { flex: 1; display: flex; justify-content: center; align-items: center; max-width: 100%; max-height: 70vh; margin-bottom: 40px; }
    #media-container img, #media-container video { max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    #meta-info { border-top: 1px solid #986c98; padding-top: 20px; width: 100%; max-width: 600px; text-align: center; }
    #file-name { font-family: monospace; color: #8ab6bb; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; word-break: break-all; }
    #index-info { color: #986c98; font-size: 0.8rem; margin-top: 10px; }
    .loading { opacity: 0.3; }
    .back-btn { position: fixed; top: 20px; left: 20px; color: #986c98; text-decoration: none; font-size: 0.8rem; border: 1px solid #986c98; padding: 5px 10px; border-radius: 4px; }
  
  </style>

</head>

<body>

  <a href="../index.html" class="back-btn">BACK</a>

  <div id="focus-viewer">
    <div id="media-container"></div>
    <div id="meta-info">
      <div id="file-name">loading...</div>
      <div id="index-info">0 / 0</div>
    </div>
  </div>

  <script>

    const mediaFiles = /* DATA_PLACEHOLDER */;

    const media = mediaFiles.map((file, idx) => ({ file: file, originalIndex: idx + 1 }));

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    // check local storage shuffle setting before starting
    const shouldShuffle = localStorage.getItem('shuffleAssets');
    if (shouldShuffle === 'true' || shouldShuffle === null) {
      shuffle(media);
    }

    let currentIndex = 0;
    const container = document.getElementById('media-container');
    const nameElement = document.getElementById('file-name');
    const indexElement = document.getElementById('index-info');

    function updateView(index) {
        const mediaObj = media[index];
        const fileName = mediaObj.file;
        const ext = fileName.split('.').pop().toLowerCase(); 

        container.classList.add('loading');
        container.innerHTML = '';
        nameElement.textContent = fileName;
        indexElement.textContent = `${mediaObj.originalIndex} / ${media.length}`;

        if (['mp4', 'webm', 'mov', 'ogg'].includes(ext)) {
            const video = document.createElement('video');
            video.muted = true; video.loop = true; video.autoplay = true; video.playsInline = true;
            video.src = fileName; 
            video.oncanplay = () => { container.classList.remove('loading'); video.play().catch(() => {}); };
            video.onerror = () => { container.innerHTML = `<p style="color:red">ERROR: ${fileName}</p>`; container.classList.remove('loading'); };
            container.appendChild(video);
        } else {
            const img = document.createElement('img');
            img.src = fileName;
            img.onload = () => container.classList.remove('loading');
            img.onerror = () => { container.innerHTML = `<p style="color:red">ERROR: ${fileName}</p>`; container.classList.remove('loading'); };
            container.appendChild(img);
        }
    }

    window.addEventListener('wheel', (e) => {
      if (e.deltaY > 0) { if (currentIndex < media.length - 1) { currentIndex++; updateView(currentIndex); } }
      else { if (currentIndex > 0) { currentIndex--; updateView(currentIndex); } }
    }, { passive: true });

    window.addEventListener('keydown', (e) => {
      if (['ArrowDown', 'ArrowRight'].includes(e.key)) { if (currentIndex < media.length - 1) { currentIndex++; updateView(currentIndex); } }
      else if (['ArrowUp', 'ArrowLeft'].includes(e.key)) { if (currentIndex > 0) { currentIndex--; updateView(currentIndex); } }
    });

    updateView(currentIndex);

  </script>

</body>

</html>
